name: Make New Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Inject access tokens
        shell: bash
        run: |
          git config --global url."https://oauth2:${{ secrets.BEEPER_DEPS_TOKEN }}@github.com/beeper/".insteadOf "https://github.com/beeper/"

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            src/RustServer/target
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Rust setup
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add x86_64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          cache: 'yarn'

      - name: Install
        run: yarn install --frozen-lockfile

      - name: Cache Swift/Objective-C build
        uses: actions/cache@v4
        with:
          path: |
            src/SwiftServer/.build
            src/AppleScriptServer/Release
            build/release-universal
            /Users/runner/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-swift-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish

