name: Make New Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publishing:
        description: 'Try to `npm publish` after building'
        required: true
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          git diff @^ @ --name-only | grep "package.json" && \
          git diff @^ @ package.json | grep "\"version\":" && \
          echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

  build:
    needs: check-version
    if: ${{ needs.check-version.outputs.should_release == 'true' }}
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Inject access tokens
        shell: bash
        run: |
          git config --global url."https://oauth2:${{ secrets.BEEPER_DEPS_TOKEN }}@github.com/beeper/".insteadOf "https://github.com/beeper/"

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            src/RustServer/target
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Rust setup
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add x86_64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          cache: 'yarn'

      - name: Install
        run: yarn install --frozen-lockfile

        # NOTE(skip): Hopefully helps with caching.
        # See: https://michalzaborowski.medium.com/circleci-60-faster-builds-use-xcode-deriveddata-for-caching-96fb9a58930
      - name: Make Xcode amenable to cached derived data
        run: |
          defaults write com.apple.dt.XCBuild IgnoreFileSystemDeviceInodeChanges -bool YES

      - name: Cache Swift/Objective-C build
        uses: actions/cache@v4
        with:
          path: |
            src/SwiftServer/.build
            src/AppleScriptServer/Release
            build/release-universal
            /Users/runner/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-swift-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Build without publishing
        if: ${{ !github.event.inputs.publishing }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          yarn build

      - name: Build and publish
        if: ${{ github.event.inputs.publishing || true }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
